<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8">
		<title>Quick Folder Move</title>
		<link rel="stylesheet" href="picker.css" type="text/css">
		<script src="picker.js" defer></script>
	</head>
	<body>
		<main class="picker">
			<input id="folderSearch" type="search" autocomplete="off" placeholder="Search folders" autofocus>
			<p id="status" aria-live="polite"></p>
			<ul id="folderList" role="listbox"></ul>
		</main>
	</body>
</html>
